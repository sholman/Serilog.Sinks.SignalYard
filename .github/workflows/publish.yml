name: Publish to NuGet

# Publishes the package to nuget.org when a version tag (e.g. v1.0.0) is pushed.
# Uses NuGet Trusted Publishing (OIDC) — no long-lived API key is stored.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for GitHub to issue the OIDC token
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/Serilog.Sinks.SignalYard/Serilog.Sinks.SignalYard.csproj -c Release --no-build -o ./artifacts

      # Exchange the OIDC token for a short-lived nuget.org API key (valid ~1 hour).
      - name: NuGet login (OIDC -> temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org profile name (NOT your email)

      - name: NuGet push
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
